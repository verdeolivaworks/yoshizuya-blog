services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yoshizuya_blog
      POSTGRES_USER: yoshizuya
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoshizuya -d yoshizuya_blog"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URI: postgres://yoshizuya:${DB_PASSWORD}@db:5432/yoshizuya_blog
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_APP_URL: https://yoshizuya-blog.atkimono.jp
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: always
